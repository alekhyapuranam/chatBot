<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .app-component{
        
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;

      }
      .input_button{
        padding:12px 24px;
        border-radius: 10%;
        margin-left: 12px;
        border: none;
        background-color: rgb(25,135,84);
        color: white;
        font-size: 20px;
        cursor: pointer;
        
      }
      .input-box{
        padding:12px 15px;
        border-radius: 10px;
         font-size: 20px;
         border-width: 1px;
         margin-right: 10px;
         width: 100%;
         
        
      }
      .input-component{
        display: flex;
       
       
        
      }
      .message-user{
        padding-top: 10px;
        display: flex;
        justify-content: end;
        align-items: center;
        border-radius: 10px;
      }
      .message-robot{
        display: flex;
        border: 10px;
        align-items: center;
      }
      .message-box{
        display: flex;
        background-color: rgb(238,238,238);
        padding: 15px 15px;
        margin: 5px 5px;
        max-width: 300px;
        word-break: break-all;

      }
      .messages-component{
        
        flex-grow: 1;
        overflow: scroll;
      }
      .loader {
        width: 50px;
  aspect-ratio: 1;
  display: grid;
  border-radius: 50%;
  background:
    linear-gradient(0deg ,rgb(0 0 0/50%) 30%,#0000 0 70%,rgb(0 0 0/100%) 0) 50%/8% 100%,
    linear-gradient(90deg,rgb(0 0 0/25%) 30%,#0000 0 70%,rgb(0 0 0/75% ) 0) 50%/100% 8%;
  background-repeat: no-repeat;
  animation: l23 1s infinite steps(12);
}
.loader::before,
.loader::after {
   content: "";
   grid-area: 1/1;
   border-radius: 50%;
   background: inherit;
   opacity: 0.915;
   transform: rotate(30deg);
}
.loader::after {
   opacity: 0.83;
   transform: rotate(60deg);
}
@keyframes l23 {
  100% {transform: rotate(1turn)}
}
    

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function InputComponent({setInput, inputMessage, loading, setLoading}){
          const [message,saveMessage]=React.useState('');
         
          function updateMessage(){
            setInput(saveInput=>[...saveInput,{image:'sender',message:message,key:crypto.randomUUID()}]);
            setLoading(true);
            let chatBotResponse= Chatbot.getResponse(message);
            setTimeout(()=>{
                setInput(saveInput=>[...saveInput,{image:'robot',message:chatBotResponse,key:crypto.randomUUID()}]);
                setLoading(false);
            },2000);
           
           saveMessage('');
          }

          function getInput(event){
            saveMessage(message=>event.target.value);
            console.log(message);
           

          }
           
            return <div className='input-component'>
            <input type="text" placeholder='enter a message' value={message} onChange={getInput} className="input-box"/>
            <button onClick={updateMessage} className='input_button'>send</button>
            </div>
        }
        function ChatMessageComponent({setInput, inputMessage, loading, setLoading}){
          let chatElement=React.useRef(null);
          

          //let chatBotResponse= Chatbot.getResponse(message);
          let goToLastMessage=React.useEffect(()=>{
            console.log(chatElement.current);
            chatElement.current.scrollTop=chatElement.current.scrollHeight;

          },[inputMessage])
          
          return <div className="messages-component" ref={chatElement}>
          {inputMessage.map(input=>(
            <div className={input.image==='robot'?'message-robot':'message-user'} >
            {input.image==='robot'&& <img src="robot.png" alt="image" width="50"/>}
            <div className="message-box">{input.message}</div>
            {input.image==='sender' && <img src='user.png' alt='userImage' width='50'></img>}
            
         </div>
          ))}
           {loading && <div className='message-robot'>
            <div  >
             <img src="robot.png" alt="image" width="50"/>
             </div>
            <div className="message-box, loader">  </div>
          </div> }
          </div>
          // return  <div>
           // {image==='robot'&& <img src="robot.png" alt="image" width="50"/>}
           // <>{message}</>
           // {image==='sender' && <img src='user.png' alt='userImage' width='50'></img>}
          //  
         //</div>
        }

        function App(){
           const [loading,setLoading]=React.useState(false);
            const [inputMessage, setInput]=React.useState([

          {
            image : 'sender',
            message : 'Hi',
            key: 'id1'
          },
          {
            image:'robot',
            message: 'How can i help you',
            key: 'id2'
          },
          {
            image: 'sender',
            message:'What is Todays Date?',
            key:'id3'
          },
          {
            image:'robot',
            message:'Today is 19th Feb 2026',
            key:'id4' 
          }

          ])
          //setInput{[...inputMessage],[{image:'sender',message:'what is the time now?',key:crypto.randomUUID()}]}
          return <div className='app-component'>
            
            <ChatMessageComponent setInput={setInput} inputMessage={inputMessage} loading={loading} setLoading={setLoading}/>
            <InputComponent setInput={setInput} inputMessage={inputMessage} loading={loading} setLoading={setLoading} />
            {/*inputMessage.map((input)=>(
             
              <ChatMessageComponent image={input.image} message={input.message}/>)
            )*/}
            </div>
        
      
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
